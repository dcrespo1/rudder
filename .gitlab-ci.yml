stages:
  - test
  - scan
  - build
  - release

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

default:
  tags:
    - docker

variables:
  GOPATH: "$CI_PROJECT_DIR/.go-cache"
  GOFLAGS: "-mod=readonly"
  SAST_EXCLUDED_ANALYZERS: "bandit,brakeman,eslint,flawfinder,nodejs-scan,phpcs-security-audit,pmd-apex,security-code-scan,sobelow,spotbugs"
  SECRET_DETECTION_HISTORIC_SCAN: "false"

# ─── Reusable anchors ─────────────────────────────────────────────────────────

.go-cache: &go-cache
  cache:
    key: "$CI_PROJECT_ID-gomod-$CI_COMMIT_REF_SLUG"
    paths:
      - .go-cache/pkg/mod
    policy: pull-push

.rules-always: &rules-always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

.rules-no-tag: &rules-no-tag
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── test stage ───────────────────────────────────────────────────────────────

test:unit:
  stage: test
  image: golang:1.22-alpine
  <<: 
    - *go-cache
    - *rules-allways
  before_script:
    - apk add --no-cache git
  script:
    - go test ./... -timeout 60s -race -coverprofile=coverage.out
    - go tool cover -func=coverage.out | tail -1
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    expire_in: 1 week
test:lint:
  stage: test
  image: golangci/golangci-lint:latest
  <<: 
    - *go-cache
    - *rules-always
  script:
    - golangci-lint run ./... --timeout 5m

# ─── scan stage ───────────────────────────────────────────────────────────────

gosec-sast:
  stage: scan
  variables:
    GOPATH: "$CI_PROJECT_DIR/.go-cache"
  <<: *rules-always

semgrep-sast:
  stage: scan
  <<: *rules-always

secret_detection:
  stage: scan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        SECRET_DETECTION_HISTORIC_SCAN: "false"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        SECRET_DETECTION_HISTORIC_SCAN: "true"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
      variables:
        SECRET_DETECTION_HISTORIC_SCAN: "false"

dependency_scanning:
  stage: scan
  <<: *rules-always

# ─── build stage ──────────────────────────────────────────────────────────────

build:snapshot:
  stage: build
  image: goreleaser/goreleaser:latest
  <<: 
    - *go-cache
    - *rules-no-tag
  before_script:
    - apk add --no-cache git
  script:
    - goreleaser release --snapshot --clean
  artifacts:
    name: "rudder-snapshot-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/
    expire_in: 3 days
    expose_as: "Snapshot binaries"
# ─── release stage ────────────────────────────────────────────────────────────

.release-base: &release-base
  stage: release
  image: goreleaser/goreleaser:latest
  <<: *go-cache
  before_script:
    - apk add --no-cache git cosign
  script:
    - goreleaser release --clean
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
    HOMEBREW_TAP_TOKEN: $HOMEBREW_TAP_TOKEN
    SCOOP_BUCKET_TOKEN: $SCOOP_BUCKET_TOKEN
    COSIGN_EXPERIMENTAL: "1"

release:stable:
  <<: *release-base
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  environment:
    name: production
    url: https://gitlab.com/dcresp0/rudder/-/releases/$CI_COMMIT_TAG

release:prerelease:
  <<: *release-base
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-(alpha|beta|rc)\.\d+$/
  environment:
    name: pre-release
    url: https://gitlab.com/dcresp0/rudder/-/releases/$CI_COMMIT_TAG