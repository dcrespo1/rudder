version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx
  disable:
    - exhaustive

  settings:
    gosec:
      excludes:
        - G402
    errcheck:
      exclude-functions:
        - (io.Writer).Write
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
    staticcheck:
      checks:
        - "all"
        - "-SA1019"

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
          - gosec
          - unparam
      - path: "internal/cluster/ping\\.go"
        linters:
          - gosec
        text: "G402"
