<svg width="560" height="160" viewBox="0 0 560 160" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Rudder</title>
  <desc>Rudder CLI — horizontal logo lockup with geometric rudder icon in purple/pink</desc>

  <!-- ── Icon ── -->
  <g transform="translate(80, 80)">

    <!-- outer ring -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.22"/>
    <!-- inner ring -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.1"/>

    <!-- vertical shaft -->
    <rect x="-4" y="-58" width="8" height="116" rx="4" fill="#e2e8f0"/>
    <!-- horizontal tiller -->
    <rect x="-44" y="-4" width="88" height="8" rx="4" fill="#e2e8f0"/>

    <!-- blade right — purple/pink -->
    <path d="M4 5 L34 44 L21 72 L4 68 Z" fill="#c084fc" opacity="0.95"/>
    <path d="M4 5 L34 44 L21 72 L4 68 Z" fill="#ec4899" opacity="0.3"/>

    <!-- blade left — recessive -->
    <path d="M-4 5 L-34 44 L-21 72 L-4 68 Z" fill="#a855f7" opacity="0.22"/>

    <!-- hub -->
    <circle cx="0" cy="0" r="10" fill="#1e1e2e" stroke="#e2e8f0" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="4" fill="#c084fc" opacity="0.9"/>

  </g>

  <!-- divider -->
  <line x1="156" y1="44" x2="156" y2="116" stroke="#4a4a5a" stroke-width="0.75"/>

  <!-- wordmark -->
  <text x="174" y="98"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="56px"
    font-weight="500"
    fill="#e2e8f0"
    letter-spacing="-1.4">rudder</text>

  <!-- tagline -->
  <text x="176" y="122"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11px"
    font-weight="400"
    fill="#6b7280"
    letter-spacing="3.5">STEER YOUR CLUSTERS</text>

</svg>
