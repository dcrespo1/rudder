apiVersion: v1
kind: Config
current-context: aks-staging
clusters:
  - name: aks-staging
    cluster:
      server: https://aks-staging.example.com:443
      insecure-skip-tls-verify: true
contexts:
  - name: aks-staging
    context:
      cluster: aks-staging
      user: aks-staging-user
users:
  - name: aks-staging-user
    user:
      token: fake-staging-token
